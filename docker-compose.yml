# Ouroboros — セルフホスト（Docker Compose）デプロイ。
#
# クイックスタート:
#   1. cp .env.example .env   &&  ANTHROPIC_API_KEY, GITHUB_TOKEN, GITHUB_REPOSITORY を設定
#   2. docker compose up --build
#   3. http://localhost:3000 を開く — 最初に登録したアカウントが管理者になります。
#
# 状態はローカル保存: SQLite は `ouro-data` ボリューム、フラット .log は `ouro-logs` ボリューム。

services:

  # ── アプリ: API + GUI + 自己修復オーケストレーター（Node）───────────────────
  app:
    build:
      context: .
      dockerfile: apps/server/Dockerfile
    image: ouroboros-app:latest
    ports:
      - "${PORT:-3000}:3000"
    restart: unless-stopped
    env_file:
      - .env
    environment:
      OURO_DB_PATH: /data/ouroboros.db
      OURO_LOG_DIR: /logs
      OURO_REPO_ROOT: /repo
      CODEQL_SARIF_PATH: /results
    volumes:
      - ouro-data:/data
      - ouro-logs:/logs
      # 自己修復対象リポジトリをマウント（LocalRunner が読み取り/パッチ/git push できるように）
      - ${OURO_REPO_PATH:-.}:/repo
      - results:/results
    networks:
      - ouroboros
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/v1/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

volumes:
  ouro-data:
  ouro-logs:
  results:

networks:
  ouroboros:
    driver: bridge
