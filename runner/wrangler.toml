name = "ouroboros-runner"
main = "src/index.ts"
compatibility_date = "2026-06-01"
compatibility_flags = ["nodejs_compat"]

# Workers AI — パッチ生成に使用
[ai]
binding = "AI"

# Runner Worker bindings
[[d1_databases]]
binding = "DB"
database_name = "ouroboros"
database_id = "fa58b005-a39c-41ea-b029-19736281f6e6"

# GitHub token for API access (git operations, PR creation)
# store_id はアカウント既存の Secrets Store（Secrets Store は1アカウント1ストアの制限）。
# `wrangler secrets-store store list --remote` で確認できる default_secrets_store の ID。
[[secrets_store_secrets]]
binding = "GITHUB_TOKEN_SECRET"
store_id = "2c7f81625137487caffd4de37aac2a3a"
secret_name = "github-token"

# Rate limiting
[[unsafe.bindings]]
name = "RATE_LIMITER"
type = "ratelimit"
namespace_id = "1002"
simple = { limit = 50, period = 60 }

[vars]
GITHUB_REPOSITORY = ""
OURO_CODE_MODEL = "@cf/meta/llama-3.1-8b-instruct"
