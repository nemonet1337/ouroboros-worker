name = "ouroboros-worker"
main = "src/index.tsx"
compatibility_date = "2024-11-01"
compatibility_flags = ["nodejs_compat"]

# Workers Observability — console.log/warn/error とリクエストトレースを
# Cloudflare ダッシュボード（Workers & Pages → ログ）で確認できる。
# head_sampling_rate = 1 は全リクエストをサンプリング（本番安定後は下げてよい）。
[observability]
enabled = true
head_sampling_rate = 1

# Workers AI — Cloudflare デプロイで唯一許可される AI ゲートウェイ。
# 外部ゲートウェイ（Anthropic API など）はこのターゲットでは一切使用されない。
# 利用可能なモデルは GET /api/v1/models（env.AI.models()）で動的に検出される。
[ai]
binding = "AI"

# D1 (SQL) — users, tokens, sessions, settings, inspections, webhooks, healing_runs
[[d1_databases]]
binding = "DB"
database_name = "ouroboros"
database_id = "fa58b005-a39c-41ea-b029-19736281f6e6"
migrations_dir = "src/db/migrations"

# R2 — フラット .log テレメトリの保存先
[[r2_buckets]]
binding = "LOGS"
bucket_name = "ouroboros-logs"

# Queues — GUI イベントの非同期取り込み
[[queues.producers]]
binding = "GUI_EVENTS"
queue = "ouroboros-gui-events"

[[queues.consumers]]
queue = "ouroboros-gui-events"
max_batch_size = 10
max_batch_timeout = 5

# Workflows — 永続的な自己修復ライフサイクルのオーケストレーション
[[workflows]]
binding = "HEALING_WORKFLOW"
name = "ouroboros-healing"
class_name = "HealingWorkflow"

# Vectorize — 適応的重み付けシステム。32観点のスコアを 32 次元ベクターとして
# 蓄積し、過去実績から観点ごとの重みを自動調整する。
# インデックス作成: wrangler vectorize create ouroboros-weight-profiles --dimensions=32 --metric=cosine
[[vectorize]]
binding = "VECTORIZE"
index_name = "ouroboros-weight-profiles"

# Vectorize — コードチャンク埋め込みインデックス。リポジトリのコードを
# bge-base-en-v1.5（768 次元）で埋め込み、自己修復解析時の RAG コンテキストに使う。
# インデックス作成: wrangler vectorize create ouroboros-code-index --dimensions=768 --metric=cosine
[[vectorize]]
binding = "VECTORIZE_CODE"
index_name = "ouroboros-code-index"

# Worker Loader（Dynamic Worker Loading、ベータ）— RUNNER / RUNNER_URL が未設定の
# 場合に、タスク実行時へ動的に runner Worker を生成するフォールバック実行基盤。
# ベータ未対応アカウントでは deploy が拒否されるため既定では無効。
# アカウントで Worker Loader が有効になったら以下 2 行のコメントを解除する
# （未設定の間、runner 未設定時は UnconfiguredRunner が明示エラーを返す）。
# [[worker_loaders]]
# binding = "LOADER"

# Workers Rate Limiting API — 公開エンドポイントの濫用を抑制
[[unsafe.bindings]]
name = "RATE_LIMITER"
type = "ratelimit"
namespace_id = "1001"
simple = { limit = 100, period = 60 }

# Worker-to-Worker service binding — 同アカウントの runner を直接呼び出す
# runner Worker (ouroboros-runner) がデプロイされていない場合、Service Binding 未解決で
# Worker デプロイが code 10143 エラーになります。runner を先にデプロイしてください。
[[services]]
binding = "RUNNER"
service = "ouroboros-runner"

# ビルド済み Tailwind CSS（src/ui/styles/tailwind.generated.css）を文字列として
# import し、Worker が /assets/tailwind.css として配信する
[[rules]]
type = "Text"
globs = ["**/*.css"]
fallthrough = true

# 廃止した GitHub Actions の日次 cron を置き換え
[triggers]
crons = ["0 2 * * *"]

[vars]
OURO_REGISTRATION_ENABLED = "false"
MAIL_FROM = "ouroboros@nemonet.work"
OURO_PLAN_MODEL = "minimax/m3"
# RUNNER_URL: CF Worker runner（GitHub API ベース）の URL。Service Binding 未設定時のフォールバック
RUNNER_URL = ""

# シークレット（`wrangler secret put <NAME>` で設定）:
#   WORKERS_AI_API_TOKEN     （任意）Workers AI 専用の Cloudflare API トークン。
#                            CLOUDFLARE_ACCOUNT_ID と併用すると REST API 経由で
#                            推論。未設定なら AI バインディングを直接使用。
#   CLOUDFLARE_ACCOUNT_ID    （任意）REST 経由の推論に必要なアカウント ID
#   GITHUB_TOKEN             PR/Issue 作成。owner/repo はこのトークンから自動検出される
#   GITHUB_REPOSITORY        （非推奨）owner/repo を手動指定する場合のみ
#   GITHUB_REPOSITORY_OWNER  （非推奨）owner を手動指定する場合のみ
#   RUNNER_SHARED_SECRET     委譲先 runner の認証用
#   OURO_ALERT_EMAILS        アラート通知先（カンマ区切り）
#
# 管理者アカウント: 初回リクエスト時（ユーザーが 0 人のとき）に /register から
# 最初に登録したアカウントが自動的に管理者になります。
# ADMIN_EMAIL / ADMIN_PASSWORD は使用しません。
#
# 注意: Ouroboros が接続する LLM は Workers AI 上のモデルに限定される。
# ANTHROPIC_API_KEY 等の外部 AI ゲートウェイのキーは一切受け付けない。
